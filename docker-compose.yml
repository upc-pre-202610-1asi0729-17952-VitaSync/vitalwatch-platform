services:
  vitalwatch-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vitalwatch-platform
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      DATABASE_URL: vitalwatch-mysql
      DATABASE_PORT: 3306
      DATABASE_NAME: vitalwatch_platform
      DATABASE_USER: vitalwatch_user
      DATABASE_PASSWORD: vitalwatch_password

      DOCUMENTATION_SERVER_URL: http://localhost:8080/api/v1
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      vitalwatch-mysql:
        condition: service_healthy
    restart: on-failure

  vitalwatch-mysql:
    image: mysql:8.4
    container_name: vitalwatch-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: vitalwatch_platform
      MYSQL_USER: vitalwatch_user
      MYSQL_PASSWORD: vitalwatch_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - vitalwatch_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -proot_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  vitalwatch_mysql_data: