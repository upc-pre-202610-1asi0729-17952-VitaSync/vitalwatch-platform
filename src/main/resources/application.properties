spring.application.name=vitalwatch-platform

server.port=8080
server.servlet.context-path=/api/v1

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

documentation.server.url=${DOCUMENTATION_SERVER_URL:http://localhost:8080/api/v1}

application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:5173,http://127.0.0.1:5173}