spring.application.name=vitalwatch-platform

server.port=${PORT:8080}
server.servlet.context-path=/api/v1

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

documentation.server.url=${DOCUMENTATION_SERVER_URL:http://localhost:8080/api/v1}

application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:5173,http://127.0.0.1:5173}

# JWT
application.security.jwt.secret=${JWT_SECRET:VitalWatchDevelopmentSecretKeyForJwtSigningMustBeAtLeastThirtyTwoCharactersLong}
application.security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}

# Internationalization
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Email provider - Resend
application.email.resend.enabled=${RESEND_ENABLED:false}
application.email.resend.api-url=${RESEND_API_URL:https://api.resend.com}
application.email.resend.api-key=${RESEND_API_KEY:}
application.email.resend.from=${RESEND_FROM_EMAIL:VitalWatch <onboarding@resend.dev>}

# Frontend public URL
application.frontend.public-url=${APP_PUBLIC_URL:http://localhost:4200}

# Email assets
application.email.logo-url=${EMAIL_LOGO_URL:https://vitalwatch.space/assets/images/logo.png}

# IoT simulation
application.simulation.iot.enabled=${IOT_SIMULATION_ENABLED:false}
application.simulation.iot.fixed-rate-ms=${IOT_SIMULATION_INTERVAL_MS:10000}
# Stripe Billing
application.billing.stripe.enabled=${STRIPE_ENABLED:false}
application.billing.stripe.secret-key=${STRIPE_SECRET_KEY:}
application.billing.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
