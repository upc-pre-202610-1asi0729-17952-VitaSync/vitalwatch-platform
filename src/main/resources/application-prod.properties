spring.datasource.url=jdbc:mysql://${DATABASE_HOST:${DATABASE_URL}}:${DATABASE_PORT:3306}/${DATABASE_NAME:vitalwatch_platform}?useSSL=true&requireSSL=true&sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

documentation.server.url=${DOCUMENTATION_SERVER_URL}

application.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
