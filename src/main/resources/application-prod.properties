# Production profile
spring.datasource.url=jdbc:mysql://${DATABASE_URL}:${DATABASE_PORT:3306}/${DATABASE_NAME}?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.show-sql=false

# For initial Azure deployment without Flyway migrations.
# After the schema exists, this can be changed to validate.
spring.jpa.hibernate.ddl-auto=update

spring.jpa.open-in-view=false

server.port=${PORT:8080}

authorization.jwt.secret=${JWT_SECRET}